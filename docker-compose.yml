services:
  postgres:
    image: postgres:16-alpine
    container_name: organiza-postgres
    environment:
      POSTGRES_USER: organiza
      POSTGRES_PASSWORD: organiza_secret
      POSTGRES_DB: organiza
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U organiza -d organiza"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
